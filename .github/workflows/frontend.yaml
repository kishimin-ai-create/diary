name: Frontend CI

on: ["push", "pull_request"]

permissions:
  contents: read
  pull-requests: write

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v3
        id: node_modules_cache
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install dependencies
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: frontend

  check:
    needs: install

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Restore node_modules
        uses: actions/cache@v3
        id: node_modules_cache
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Run Type Check
        run: npm run typecheck
        working-directory: frontend

      - name: Run Lint
        run: npm run lint
        working-directory: frontend

  unit-test:
    needs: install

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Restore node_modules
        uses: actions/cache@v3
        id: node_modules_cache
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Vitest unit test # Run npm vitest in CI environment
        run: npm test
        working-directory: frontend

      - name: "Report Vitest Result"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            // Skip if not running on a pull request.
            // Combining with if: always() may make this unnecessary, but leaving it for now.
            if (!context.payload.pull_request) {
              console.log("Not running on a pull request.");
              process.exit(0);
            }

            const TEST_RESULT_PATH = "frontend/test-result.json";

            if (!fs.existsSync(TEST_RESULT_PATH)) {
              console.log(`Test result file not found at ${TEST_RESULT_PATH}.`);
              process.exit(1);
            }

            // Read the Vitest execution result file.
            const result = JSON.parse(fs.readFileSync(TEST_RESULT_PATH, "utf8"));

            if (result.numTotalTests === 0) {
              console.log("No test case.");
              process.exit(1);
            }

            const runLink = `${process.env.GITHUB_SERVER_URL || "https://github.com"}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            // Build the Vitest result as a pull request comment.
            const body = `
            # Test Results\n
            **${result.success ? "All tests passed" : "Some tests failed"}**\n
            \n
            ## Test Suites\n
            - Total: ${result.numTotalTestSuites}
              - Passed: ${result.numPassedTestSuites}
              - Failed: ${result.numFailedTestSuites}
              - Pending: ${result.numPendingTestSuites}
            \n
            ## Test Cases\n
            - Total: ${result.numTotalTests}
              - Passed: ${result.numPassedTests}
              - Failed: ${result.numFailedTests}
              - Pending: ${result.numPendingTests}
            \n
            ## Full Report Link\n
            (Actions run): ${runLink}\n
            \n
            _Generated by workflow ${process.env.GITHUB_WORKFLOW || ""}_
            `;

            // Post the assembled comment (body) to the pull request.
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
