name: CI (Nightly)

on:
  schedule:
    - cron: '0 18 * * *' # UTC 18:00 = JST 03:00
  workflow_dispatch:

jobs:
  backend:
    name: Backend CI (All Tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Run small tests
        run: bun run test:small

      - name: Run medium tests
        run: bun run test:medium

      - name: Run large tests
        run: bun run test:large

  frontend:
    name: Frontend CI (All Tests + VRT)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Run small tests
        run: bun run test:small

      - name: Run medium tests
        run: bun run test:medium

      - name: Run large tests
        run: bun run test:large

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-result.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Build Storybook
        run: bun run build-storybook

      - name: Build app
        run: bun run build

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps

      - name: Run E2E tests
        run: bun run e2e

      - name: Capture VRT screenshots
        run: bunx storycap --serverCmd "bunx serve storybook-static -l 6006" http://localhost:6006

      - name: Run VRT comparison
        run: bun run vrt
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload VRT diff
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-diff
          path: frontend/.reg/
          retention-days: 7
