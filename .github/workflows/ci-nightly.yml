name: CI (Nightly)

on:
  schedule:
    - cron: '0 18 * * *' # UTC 18:00 = JST 03:00
  workflow_dispatch:

jobs:
  e2e-full:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # 本番ビルド → Playwright webServer が vite preview を管理する
      - name: Build app
        run: npm run build

      # Playwright フル（全ブラウザ・全テスト）
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright (full suite, all browsers)
        run: npx playwright test --grep-invert "@visual"
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      # Storybook ビルド確認
      - name: Build Storybook
        run: npm run build-storybook -- --quiet

      # ビジュアルリグレッション（Playwright toHaveScreenshot）
      # スナップショットが存在しない初回は --update-snapshots で生成し、コミット・プッシュする
      - name: Run visual regression tests
        run: npx playwright test --grep "@visual" --project=chromium
        env:
          RUN_VISUAL_TESTS: 1
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      # 差分スナップショットをアーティファクトとして保存（テスト失敗時の確認用）
      - name: Upload snapshot diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs
          path: frontend/test-results/
          retention-days: 7
